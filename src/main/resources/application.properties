spring.application.name=my-ai-app
server.port=8888
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB
spring.config.import=optional:file:.env.properties

bailian.api.url=${bailian.api.url}
bailian.api.key=${bailian.api.key}
bailian.api.model=${bailian.api.model}
bailian.api.max-tokens=${bailian.api.max-tokens}
# Multimodal chat when user attaches images (configured via env / .env.properties)
bailian.api.chat-vision-model=${bailian.api.chat-vision-model}

spring.datasource.url=${spring.datasource.url}
spring.datasource.username=${spring.datasource.username}
spring.datasource.password=${spring.datasource.password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.ai.app.chat.domain
mybatis.configuration.map-underscore-to-camel-case=true

app.chat.attachments.dir=data/chat-attachments
